name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Empacotar extensão
        run: npx --yes @vscode/vsce package -o esron-dark.vsix

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: esron-dark.vsix

      # Descomente pra publicar direto no VS Code Marketplace.
      # Requer o secret VSCE_PAT (Personal Access Token gerado no Azure DevOps)
      # configurado em Settings > Secrets and variables > Actions.
      # - name: Publicar no VS Code Marketplace
      #   run: npx --yes @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}