;===============================================================================
; Esron Dark - INI Preview
; Este arquivo existe apenas para testar a coloração do tema.
;===============================================================================

# Comentário utilizando '#'

; Comentário utilizando ';'

;===============================================================================
; Application
;===============================================================================

[Application]

Name = Esron Dark
Version = 1.0.0
Author = Esron
License = MIT

Enabled = true
Debug = false

MaxUsers = 250
Timeout = 30
RefreshRate = 60

Pi = 3.1415926535

HexColor = #1D1F23

Greeting = Hello World

Path = C:\Users\Esron\Projects

LinuxPath = /home/esron/projects

Url = https://github.com/esron/Esron-Dark

Email = contato@esron.dev

;===============================================================================
; Window
;===============================================================================

[Window]

Width = 1920
Height = 1080

Fullscreen = false

Resizable = true

Scale = 1.25

;===============================================================================
; Editor
;===============================================================================

[Editor]

Theme = Esron Dark

Font = JetBrains Mono

FontSize = 14

LineHeight = 1.5

WordWrap = on

Cursor = block

HighlightLine = true

Minimap = true

;===============================================================================
; Colors
;===============================================================================

[Colors]

Background = #1D1F23
Foreground = #D8DEE9

Keyword = #7A9FE6
Type = #D16D6D
Function = #5A7FBF
Builtin = #88C0D0
Variable = #D8DEE9
String = #A3BE8C
Number = #D08770
Comment = #6C7480

;===============================================================================
; Network
;===============================================================================

[Network]

Host = localhost

Port = 8080

Protocol = https

IPv4 = 127.0.0.1

IPv6 = ::1

;===============================================================================
; Database
;===============================================================================

[Database]

Driver = PostgreSQL

Host = localhost

Port = 5432

Database = esron

Username = admin

Password = secret

SSL = true

;===============================================================================
; Logging
;===============================================================================

[Logging]

Level = DEBUG

File = logs/application.log

MaxSize = 100MB

Rotate = true

Backup = 10

;===============================================================================
; Build
;===============================================================================

[Build]

Compiler = GCC

Optimization = O2

Warnings = All

TreatWarningsAsErrors = true

Output = build/

;===============================================================================
; Extensions
;===============================================================================

[Extensions]

Python = ms-python.python

Rust = rust-lang.rust-analyzer

Go = golang.go

Lua = sumneko.lua

PowerShell = ms-vscode.powershell

TOML = tamasfe.even-better-toml

YAML = redhat.vscode-yaml

;===============================================================================
; Unicode
;===============================================================================

[Unicode]

Portuguese = Olá Mundo

Japanese = こんにちは

Emoji = 🚀🔥💻

;===============================================================================
; End
;===============================================================================