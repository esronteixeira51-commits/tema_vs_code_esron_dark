# ============================================================
# Esron Dark - TOML Preview
# https://toml.io
# ============================================================

title = "Esron Dark Preview"

version = "1.0.0"

author = "Esron"

description = """
Tema profissional para VS Code inspirado no COSMIC.
"""

license = "MIT"

repository = "https://github.com/esron/esron-dark"

homepage = "https://esron.dev"

documentation = "https://docs.esron.dev"

# ============================================================
# Numbers
# ============================================================

integer = 42

negative = -42

float = 3.1415926535

scientific = 5e+22

small = 1e-9

hex = 0xDEADBEEF

octal = 0o755

binary = 0b101010

underscores = 1_000_000

# ============================================================
# Boolean
# ============================================================

enabled = true

disabled = false

# ============================================================
# Date & Time
# ============================================================

birthday = 1998-04-12

meeting = 2026-08-14T15:30:00Z

timezone = 2026-08-14T15:30:00-03:00

# ============================================================
# Strings
# ============================================================

single = "Hello World"

path = "C:\\Users\\Esron"

unicode = "Olá Mundo"

emoji = "🚀🔥"

literal = '''
C:\Users\Esron\Desktop
'''

multiline = """
Linha 1
Linha 2
Linha 3
"""

# ============================================================
# Arrays
# ============================================================

numbers = [1, 2, 3, 4, 5]

strings = [
    "Python",
    "Rust",
    "Go",
    "Zig"
]

mixed = [
    1,
    2,
    3
]

matrix = [
    [1,2,3],
    [4,5,6],
    [7,8,9]
]

# ============================================================
# Tables
# ============================================================

[database]

host = "localhost"

port = 5432

username = "admin"

password = "secret"

enabled = true

# ============================================================
# Nested Tables
# ============================================================

[database.pool]

min = 5

max = 50

timeout = 30

# ============================================================
# Another Table
# ============================================================

[server]

host = "0.0.0.0"

port = 8080

ssl = true

# ============================================================
# Arrays of Tables
# ============================================================

[[users]]

id = 1

name = "Alice"

admin = true

[[users]]

id = 2

name = "Bob"

admin = false

[[users]]

id = 3

name = "Charlie"

admin = false

# ============================================================
# Inline Table
# ============================================================

owner = { name = "Esron", age = 25 }

window = { width = 1280, height = 720 }

# ============================================================
# Dotted Keys
# ============================================================

site.name = "Esron Dark"

site.author = "Esron"

site.theme = "Dark"

# ============================================================
# Package
# ============================================================

[package]

name = "esron-dark"

version = "1.0.0"

edition = "2026"

# ============================================================
# Dependencies
# ============================================================

[dependencies]

python = ">=3.13"

node = ">=24"

rust = "stable"

go = "1.25"

zig = "0.15"

# ============================================================
# Build
# ============================================================

[build]

release = true

opt-level = 3

debug = false

lto = true

# ============================================================
# Colors
# ============================================================

[theme]

background = "#1D1F23"

foreground = "#D8DEE9"

keyword = "#7A9FE6"

type = "#D16D6D"

function = "#5A7FBF"

builtin = "#88C0D0"

string = "#A3BE8C"

number = "#D08770"

comment = "#6C7480"

# ============================================================
# End
# ============================================================